<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design Parameters Portal</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif}

body{
    height:100vh;
    overflow:hidden;
    background:transparent;
}
/* Background */
#scene{
    position:fixed;
    inset:0;
    overflow:hidden;
    background:transparent;
}

/* Welding Sparks */
.spark{
    position:absolute;
    width:4px;
    height:4px;
    background:#ffd54f;
    border-radius:50%;
    opacity:.9;
    animation:sparks linear infinite;
}

.weld-point{
    position:absolute;
    width:10px;
    height:10px;
    border-radius:50%;
    background:#fff;
    z-index:999;

    box-shadow:
        0 0 10px #fff,
        0 0 20px #ffd54f,
        0 0 35px #ff9800;
}

@keyframes sparks{
    from{
        transform:translate(0,0) scale(1);
        opacity:1;
    }
    to{
        transform:translate(var(--x),var(--y)) scale(0);
        opacity:0;
    }
}

/* Main Panel */
.container{
    position:relative;
    z-index:5;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding-top:20px;
}

.panel{
    width:min(1100px,92%);
    text-align:center;
}

h1{
    font-size:4rem;
    font-weight:900;
    letter-spacing:4px;

    color:#e8e8e8;

    text-transform:uppercase;

    text-shadow:
        0 2px 0 #777,
        0 4px 0 #555,
        0 0 15px rgba(255,0,0,.5),
        0 0 30px rgba(255,0,0,.35);

    margin-bottom:10px;
}

.subtitle{
    color:#d8d8d8;
    font-size:1.1rem;
    letter-spacing:2px;
    margin-bottom:35px;
}

/* REALISTIC DRONE */
.drone{
    position:absolute;
    top:80px;
    right:12%;
    width:180px;
    height:100px;
    z-index:4;
    animation:droneFlight 8s ease-in-out infinite;
}

.drone svg{
    width:100%;
    height:100%;
    overflow:visible;
}

.propeller{
    transform-origin:center;
    animation:propSpin .08s linear infinite;
}

.drone-light-red{
    animation:blinkRed 1s infinite;
}

.drone-light-green{
    animation:blinkGreen 1s infinite;
}

.searchlight{
    animation:beamPulse 2s ease-in-out infinite;
}

@keyframes propSpin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

@keyframes droneFlight{
    0%,100%{
        transform:translate(0,0) rotate(-1deg);
    }
    25%{
        transform:translate(30px,-12px) rotate(1deg);
    }
    50%{
        transform:translate(60px,0px) rotate(-1deg);
    }
    75%{
        transform:translate(30px,12px) rotate(1deg);
    }
}

@keyframes blinkRed{
    0%,50%,100%{opacity:1;}
    25%,75%{opacity:.2;}
}

@keyframes blinkGreen{
    0%,50%,100%{opacity:.2;}
    25%,75%{opacity:1;}
}

@keyframes beamPulse{
    0%,100%{opacity:.15;}
    50%{opacity:.3;}
}

/* Buttons */
.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:18px;
}

.btn{
    position:relative;

    padding:18px 25px;

    color:white;
    font-weight:700;
    font-size:15px;

    border:none;

    cursor:pointer;

    clip-path:polygon(
        8% 0,
        92% 0,
        100% 50%,
        92% 100%,
        8% 100%,
        0 50%
    );

    background:
    linear-gradient(
        135deg,
        #080808,
        #230000,
        #050505
    );

    border:1px solid rgba(255,60,60,.4);

    box-shadow:
        inset 0 0 0 2px rgba(255,255,255,.08),
        0 0 15px rgba(255,0,0,.25),
        0 10px 25px rgba(0,0,0,.6);

    overflow:hidden;

    transition:.35s;
}

.btn::before{
    content:'';

    position:absolute;
    inset:3px;

    clip-path:inherit;

    background:
    linear-gradient(
        135deg,
        rgba(255,0,0,.2),
        transparent 40%,
        rgba(255,0,0,.25)
    );
}

.btn::after{
    content:'';

    position:absolute;
    top:0;
    left:-120%;

    width:70%;
    height:100%;

    background:
    linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,.2),
        transparent
    );

    transition:1s;
}

.btn:hover::after{
    left:150%;
}

.btn:hover{
    transform:translateY(-5px);

    box-shadow:
        0 0 30px rgba(255,0,0,.6),
        0 15px 35px rgba(0,0,0,.8);
}

footer{
    position:fixed;
    bottom:0;
    width:100%;

    text-align:center;

    padding:16px;

    color:#f5f5f5;

    font-size:12px;
    letter-spacing:2px;

    background:
    linear-gradient(
        to bottom,
        #111,
        #000
    );

    border-top:3px solid #ff2f2f;

    box-shadow:
        0 -5px 20px rgba(255,0,0,.25);

    z-index:9999;
}

footer::before{
    content:'';

    position:absolute;
    left:0;
    top:-8px;

    width:100%;
    height:8px;

    background:
    repeating-linear-gradient(
        -45deg,
        #ffb300 0 10px,
        #111 10px 20px
    );
}

@media(max-width:768px){
.grid{grid-template-columns:1fr}
h1{font-size:2rem}
}
</style>
</head>
<body>

<script>
const scene = document.getElementById('scene');

const weldPoints = [
    {x:15, y:75},
    {x:25, y:65},
    {x:35, y:80},
    {x:45, y:55},
    {x:55, y:70},
    {x:65, y:60},
    {x:75, y:75},
    {x:85, y:55},
    {x:20, y:45},
    {x:40, y:40},
    {x:60, y:35},
    {x:80, y:45}
];

// Visible welding stations
weldPoints.forEach(point => {
    const wp = document.createElement('div');
    wp.className = 'weld-point';
    wp.style.left = point.x + '%';
    wp.style.top = point.y + '%';
    scene.appendChild(wp);
});

// Generate sparks continuously
function createSpark(point){

    const s = document.createElement('div');
    s.className = 'spark';

    s.style.left = (point.x + Math.random()*8 - 4) + '%';
    s.style.top  = (point.y + Math.random()*8 - 4) + '%';

    s.style.setProperty('--x', (Math.random()*300 - 150) + 'px');
    s.style.setProperty('--y', (Math.random()*-250) + 'px');

    s.style.animationDuration = (0.4 + Math.random()*0.8) + 's';

    scene.appendChild(s);

    setTimeout(() => {
        if(s.parentNode) s.remove();
    }, 1200);
}

// Continuous welding effect
setInterval(() => {

    weldPoints.forEach(point => {

        const count = Math.floor(Math.random()*6) + 4;

        for(let i=0;i<count;i++){
            createSpark(point);
        }

    });

}, 150);
</script>
