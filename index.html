<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design Parameters Portal</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif}

body{
    height:100vh;
    overflow:hidden;
    background:linear-gradient(to bottom,#6faee0,#dcefff);
}

/* Background */
#scene{
    position:fixed;
    inset:0;
    overflow:hidden;
}

/* Ground */
.ground{
    position:absolute;
    bottom:0;
    width:100%;
    height:140px;
    background:#77583a;
}

/* Tower Crane */
.crane{
    position:absolute;
    left:8%;
    bottom:140px;
    width:14px;
    height:340px;
    background:#ffb300;
}

.crane-arm{
    position:absolute;
    top:0;
    left:0;
    width:260px;
    height:10px;
    background:#ffb300;
    transform-origin:left center;
    animation:swing 6s ease-in-out infinite;
}

.hook{
    position:absolute;
    right:10px;
    top:10px;
    width:3px;
    height:90px;
    background:#333;
    animation:lift 4s ease-in-out infinite;
}

@keyframes swing{
    0%,100%{transform:rotate(-2deg)}
    50%{transform:rotate(2deg)}
}

@keyframes lift{
    0%,100%{height:90px}
    50%{height:150px}
}

/* Building */
.building{
    position:absolute;
    right:8%;
    bottom:140px;
    width:220px;
    height:260px;
    background:#c8c8c8;
    border:3px solid #888;
}

/* Workers */
.worker{
    position:absolute;
    bottom:140px;
    width:40px;
    height:90px;
    animation:walk 16s linear infinite;
}

.worker:nth-child(1){left:-50px}
.worker:nth-child(2){left:-250px;animation-delay:5s}
.worker:nth-child(3){left:-450px;animation-delay:10s}

.head{
    width:18px;height:18px;background:#ffd6b3;border-radius:50%;
    border:2px solid #000;margin:auto;
}
.helmet{
    width:20px;height:10px;background:#ffd000;
    border-radius:10px 10px 0 0;
    margin:-18px auto 0;
}
.bodyline{
    width:3px;height:28px;background:#000;margin:auto;
}
.arm1,.arm2,.leg1,.leg2{
    position:absolute;background:#000;height:2px;width:18px;
}
.arm1{top:35px;left:9px;transform:rotate(25deg)}
.arm2{top:35px;left:13px;transform:rotate(-25deg)}
.leg1{top:60px;left:9px;transform:rotate(25deg)}
.leg2{top:60px;left:13px;transform:rotate(-25deg)}

@keyframes walk{
    from{transform:translateX(0)}
    to{transform:translateX(calc(100vw + 600px))}
}

/* Welding Sparks */
.spark{
    position:absolute;
    width:4px;
    height:4px;
    background:#ffd54f;
    border-radius:50%;
    opacity:.9;
    animation:sparks linear infinite;
}

@keyframes sparks{
    from{
        transform:translate(0,0) scale(1);
        opacity:1;
    }
    to{
        transform:translate(var(--x),var(--y)) scale(0);
        opacity:0;
    }
}

/* Main Panel */
.container{
    position:relative;
    z-index:5;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.panel{
    width:min(1100px,92%);
    text-align:center;
}

h1{
    color:#fff;
    font-size:3rem;
    text-shadow:0 0 20px rgba(0,0,0,.4);
}

.subtitle{
    color:#fff;
    margin:10px 0 35px;
}

/* REALISTIC DRONE */
.drone{
    position:absolute;
    top:80px;
    right:12%;
    width:180px;
    height:100px;
    z-index:4;
    animation:droneFlight 8s ease-in-out infinite;
}

.drone svg{
    width:100%;
    height:100%;
    overflow:visible;
}

.propeller{
    transform-origin:center;
    animation:propSpin .08s linear infinite;
}

.drone-light-red{
    animation:blinkRed 1s infinite;
}

.drone-light-green{
    animation:blinkGreen 1s infinite;
}

.searchlight{
    animation:beamPulse 2s ease-in-out infinite;
}

@keyframes propSpin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

@keyframes droneFlight{
    0%,100%{
        transform:translate(0,0) rotate(-1deg);
    }
    25%{
        transform:translate(30px,-12px) rotate(1deg);
    }
    50%{
        transform:translate(60px,0px) rotate(-1deg);
    }
    75%{
        transform:translate(30px,12px) rotate(1deg);
    }
}

@keyframes blinkRed{
    0%,50%,100%{opacity:1;}
    25%,75%{opacity:.2;}
}

@keyframes blinkGreen{
    0%,50%,100%{opacity:.2;}
    25%,75%{opacity:1;}
}

@keyframes beamPulse{
    0%,100%{opacity:.15;}
    50%{opacity:.3;}
}

/* Buttons */
.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:18px;
}

.btn{
    position:relative;
    overflow:hidden;
    padding:18px;
    border-radius:22px;
    border:1px solid rgba(255,80,80,.4);
    color:#fff;
    font-weight:700;
    text-transform:uppercase;
    cursor:pointer;

    background:
    radial-gradient(circle at 20% 20%,rgba(255,0,0,.7),transparent 35%),
    radial-gradient(circle at 80% 70%,rgba(140,0,0,.8),transparent 45%),
    linear-gradient(135deg,#050505,#330000,#111);

    backdrop-filter:blur(12px);

    box-shadow:
    0 10px 25px rgba(0,0,0,.5),
    0 0 20px rgba(255,0,0,.3);

    transition:.35s;
}

.btn:hover{
    transform:translateY(-6px) scale(1.03);
    box-shadow:
    0 18px 35px rgba(0,0,0,.6),
    0 0 35px rgba(255,0,0,.6);
}

.btn::before{
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,.18),transparent);
    transform:translateX(-150%);
    transition:1s;
}

.btn:hover::before{
    transform:translateX(150%);
}

footer{
    position:fixed;
    bottom:0;
    width:100%;
    text-align:center;
    padding:12px;
    color:white;
    background:rgba(0,0,0,.45);
    font-size:12px !important;
    z-index:9999;
}

@media(max-width:768px){
.grid{grid-template-columns:1fr}
h1{font-size:2rem}
}
</style>
</head>
<body>

<div id="scene">

<div class="crane">
    <div class="crane-arm">
        <div class="hook"></div>
    </div>
</div>

<div class="drone">

<svg viewBox="0 0 400 220">

    <!-- Searchlight -->
    <polygon class="searchlight"
        points="200,120 150,220 250,220"
        fill="rgba(255,255,180,.2)"/>

    <!-- Arms -->
    <line x1="200" y1="90" x2="90" y2="40"
          stroke="#444" stroke-width="8"/>
    <line x1="200" y1="90" x2="310" y2="40"
          stroke="#444" stroke-width="8"/>
    <line x1="200" y1="90" x2="90" y2="140"
          stroke="#444" stroke-width="8"/>
    <line x1="200" y1="90" x2="310" y2="140"
          stroke="#444" stroke-width="8"/>

    <!-- Propellers -->
    <g class="propeller">
        <ellipse cx="90" cy="40" rx="28" ry="4" fill="#222"/>
        <ellipse cx="90" cy="40" rx="4" ry="28" fill="#222"/>
    </g>

    <g class="propeller">
        <ellipse cx="310" cy="40" rx="28" ry="4" fill="#222"/>
        <ellipse cx="310" cy="40" rx="4" ry="28" fill="#222"/>
    </g>

    <g class="propeller">
        <ellipse cx="90" cy="140" rx="28" ry="4" fill="#222"/>
        <ellipse cx="90" cy="140" rx="4" ry="28" fill="#222"/>
    </g>

    <g class="propeller">
        <ellipse cx="310" cy="140" rx="28" ry="4" fill="#222"/>
        <ellipse cx="310" cy="140" rx="4" ry="28" fill="#222"/>
    </g>

    <!-- Main Body -->
    <rect x="145" y="55" width="110" height="70"
          rx="25" fill="#2f2f2f"/>

    <rect x="165" y="65" width="70" height="30"
          rx="12" fill="#4a4a4a"/>

    <!-- Camera -->
    <line x1="200" y1="125" x2="200" y2="145"
          stroke="#777" stroke-width="4"/>

    <circle cx="200" cy="160" r="16"
            fill="#111"/>

    <circle cx="200" cy="160" r="8"
            fill="#3da9ff"/>

    <!-- Navigation Lights -->
    <circle class="drone-light-red"
            cx="145" cy="90" r="5"
            fill="red"/>

    <circle class="drone-light-green"
            cx="255" cy="90" r="5"
            fill="#00ff66"/>

</svg>

</div>

<div class="building"></div>

<div class="worker">
<div class="head"></div><div class="helmet"></div><div class="bodyline"></div>
<div class="arm1"></div><div class="arm2"></div><div class="leg1"></div><div class="leg2"></div>
</div>

<div class="worker">
<div class="head"></div><div class="helmet"></div><div class="bodyline"></div>
<div class="arm1"></div><div class="arm2"></div><div class="leg1"></div><div class="leg2"></div>
</div>

<div class="worker">
<div class="head"></div><div class="helmet"></div><div class="bodyline"></div>
<div class="arm1"></div><div class="arm2"></div><div class="leg1"></div><div class="leg2"></div>
</div>

<div class="ground"></div>
</div>

</div>

<script>
for(let i=0;i<120;i++){
 const s=document.createElement('div');
 s.className='spark';
 s.style.left=(70+Math.random()*10)+'%';
 s.style.top=(55+Math.random()*10)+'%';
 s.style.setProperty('--x',(Math.random()*180-90)+'px');
 s.style.setProperty('--y',(Math.random()*-140)+'px');
 s.style.animationDuration=(0.8+Math.random()*1.5)+'s';
 s.style.animationDelay=(Math.random()*2)+'s';
 document.getElementById('scene').appendChild(s);
}
