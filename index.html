<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design Parameters Portal</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif}

body{
    height:100vh;
    overflow:hidden;
    background:
    radial-gradient(circle at 50% 70%,
    rgba(255,80,0,.25) 0%,
    transparent 40%),

    linear-gradient(
        to bottom,
        #040608 0%,
        #10141b 35%,
        #1c0f0f 70%,
        #080808 100%
    );
}

/* Background */
#scene{
    position:fixed;
    inset:0;
    overflow:hidden;
}

/* Ground */
.ground{
    position:absolute;
    bottom:0;
    width:100%;
    height:140px;
    background:#77583a;
}

/* Tower Crane */
.crane{
    position:absolute;
    left:8%;
    bottom:140px;
    width:14px;
    height:340px;
    background:#ffb300;
}

.crane-arm{
    position:absolute;
    top:0;
    left:0;
    width:260px;
    height:10px;
    background:#ffb300;
    transform-origin:left center;
    animation:swing 6s ease-in-out infinite;
}

.hook{
    position:absolute;
    right:10px;
    top:10px;
    width:3px;
    height:90px;
    background:#333;
    animation:lift 4s ease-in-out infinite;
}

@keyframes swing{
    0%,100%{transform:rotate(-2deg)}
    50%{transform:rotate(2deg)}
}

@keyframes lift{
    0%,100%{height:90px}
    50%{height:150px}
}

/* Building */
.building{
    position:absolute;
    right:8%;
    bottom:140px;
    width:220px;
    height:260px;
    background:#c8c8c8;
    border:3px solid #888;
}

/* Workers */
.worker{
    position:absolute;
    bottom:140px;
    width:40px;
    height:90px;
    animation:walk 16s linear infinite;
}

.worker:nth-child(1){left:-50px}
.worker:nth-child(2){left:-250px;animation-delay:5s}
.worker:nth-child(3){left:-450px;animation-delay:10s}

.head{
    width:18px;height:18px;background:#ffd6b3;border-radius:50%;
    border:2px solid #000;margin:auto;
}
.helmet{
    width:20px;height:10px;background:#ffd000;
    border-radius:10px 10px 0 0;
    margin:-18px auto 0;
}
.bodyline{
    width:3px;height:28px;background:#000;margin:auto;
}
.arm1,.arm2,.leg1,.leg2{
    position:absolute;background:#000;height:2px;width:18px;
}
.arm1{top:35px;left:9px;transform:rotate(25deg)}
.arm2{top:35px;left:13px;transform:rotate(-25deg)}
.leg1{top:60px;left:9px;transform:rotate(25deg)}
.leg2{top:60px;left:13px;transform:rotate(-25deg)}

@keyframes walk{
    from{transform:translateX(0)}
    to{transform:translateX(calc(100vw + 600px))}
}

/* Welding Sparks */
.spark{
    position:absolute;
    width:4px;
    height:4px;
    background:#ffd54f;
    border-radius:50%;
    opacity:.9;
    animation:sparks linear infinite;
}

@keyframes sparks{
    from{
        transform:translate(0,0) scale(1);
        opacity:1;
    }
    to{
        transform:translate(var(--x),var(--y)) scale(0);
        opacity:0;
    }
}

/* Main Panel */
.container{
    position:relative;
    z-index:5;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding-top:20px;
}

.panel{
    width:min(1100px,92%);
    text-align:center;
}

h1{
    font-size:4rem;
    font-weight:900;
    letter-spacing:4px;

    color:#e8e8e8;

    text-transform:uppercase;

    text-shadow:
        0 2px 0 #777,
        0 4px 0 #555,
        0 0 15px rgba(255,0,0,.5),
        0 0 30px rgba(255,0,0,.35);

    margin-bottom:10px;
}

.subtitle{
    color:#d8d8d8;
    font-size:1.1rem;
    letter-spacing:2px;
    margin-bottom:35px;
}

/* REALISTIC DRONE */
.drone{
    position:absolute;
    top:80px;
    right:12%;
    width:180px;
    height:100px;
    z-index:4;
    animation:droneFlight 8s ease-in-out infinite;
}

.drone svg{
    width:100%;
    height:100%;
    overflow:visible;
}

.propeller{
    transform-origin:center;
    animation:propSpin .08s linear infinite;
}

.drone-light-red{
    animation:blinkRed 1s infinite;
}

.drone-light-green{
    animation:blinkGreen 1s infinite;
}

.searchlight{
    animation:beamPulse 2s ease-in-out infinite;
}

@keyframes propSpin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

@keyframes droneFlight{
    0%,100%{
        transform:translate(0,0) rotate(-1deg);
    }
    25%{
        transform:translate(30px,-12px) rotate(1deg);
    }
    50%{
        transform:translate(60px,0px) rotate(-1deg);
    }
    75%{
        transform:translate(30px,12px) rotate(1deg);
    }
}

@keyframes blinkRed{
    0%,50%,100%{opacity:1;}
    25%,75%{opacity:.2;}
}

@keyframes blinkGreen{
    0%,50%,100%{opacity:.2;}
    25%,75%{opacity:1;}
}

@keyframes beamPulse{
    0%,100%{opacity:.15;}
    50%{opacity:.3;}
}

/* Buttons */
.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:18px;
}

.btn{
    position:relative;

    padding:18px 25px;

    color:white;
    font-weight:700;
    font-size:15px;

    border:none;

    cursor:pointer;

    clip-path:polygon(
        8% 0,
        92% 0,
        100% 50%,
        92% 100%,
        8% 100%,
        0 50%
    );

    background:
    linear-gradient(
        135deg,
        #080808,
        #230000,
        #050505
    );

    border:1px solid rgba(255,60,60,.4);

    box-shadow:
        inset 0 0 0 2px rgba(255,255,255,.08),
        0 0 15px rgba(255,0,0,.25),
        0 10px 25px rgba(0,0,0,.6);

    overflow:hidden;

    transition:.35s;
}

.btn::before{
    content:'';

    position:absolute;
    inset:3px;

    clip-path:inherit;

    background:
    linear-gradient(
        135deg,
        rgba(255,0,0,.2),
        transparent 40%,
        rgba(255,0,0,.25)
    );
}

.btn::after{
    content:'';

    position:absolute;
    top:0;
    left:-120%;

    width:70%;
    height:100%;

    background:
    linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,.2),
        transparent
    );

    transition:1s;
}

.btn:hover::after{
    left:150%;
}

.btn:hover{
    transform:translateY(-5px);

    box-shadow:
        0 0 30px rgba(255,0,0,.6),
        0 15px 35px rgba(0,0,0,.8);
}

footer{
    position:fixed;
    bottom:0;
    width:100%;

    text-align:center;

    padding:16px;

    color:#f5f5f5;

    font-size:12px;
    letter-spacing:2px;

    background:
    linear-gradient(
        to bottom,
        #111,
        #000
    );

    border-top:3px solid #ff2f2f;

    box-shadow:
        0 -5px 20px rgba(255,0,0,.25);

    z-index:9999;
}

footer::before{
    content:'';

    position:absolute;
    left:0;
    top:-8px;

    width:100%;
    height:8px;

    background:
    repeating-linear-gradient(
        -45deg,
        #ffb300 0 10px,
        #111 10px 20px
    );
}

@media(max-width:768px){
.grid{grid-template-columns:1fr}
h1{font-size:2rem}
}
</style>
</head>
<body>

    <g class="propeller">

<script>
for(let i=0;i<120;i++){
 const s=document.createElement('div');
 s.className='spark';
 s.style.left=(70+Math.random()*10)+'%';
 s.style.top=(55+Math.random()*10)+'%';
 s.style.setProperty('--x',(Math.random()*180-90)+'px');
 s.style.setProperty('--y',(Math.random()*-140)+'px');
 s.style.animationDuration=(0.8+Math.random()*1.5)+'s';
 s.style.animationDelay=(Math.random()*2)+'s';
 document.getElementById('scene').appendChild(s);
}

for(let i=0;i<80;i++){

    const ember=document.createElement('div');

    ember.style.position='absolute';
    ember.style.width='3px';
    ember.style.height='3px';
    ember.style.borderRadius='50%';

    ember.style.background='#ff4d00';

    ember.style.left=Math.random()*100+'vw';
    ember.style.top=Math.random()*100+'vh';

    ember.style.opacity=Math.random();

    ember.animate([
        {transform:'translateY(0px)',opacity:.8},
        {transform:'translateY(-200px)',opacity:0}
    ],{
        duration:4000+Math.random()*6000,
        iterations:Infinity
    });

    document.getElementById('scene').appendChild(ember);
}

</script>
